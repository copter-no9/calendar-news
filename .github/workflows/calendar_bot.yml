name: Economic Calendar Bot

on:
  schedule:
    # เวลาใน GitHub Actions ใช้มาตรฐาน UTC เสมอ
    # 06:00 น. เวลาไทย (UTC+7) จะตรงกับเวลา 23:00 น. UTC ของวันก่อนหน้า
    - cron: '18 3 * * *'
  workflow_dispatch: # ทำให้เราสามารถกดรันแบบ Manual บนหน้าเว็บ GitHub ได้

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz
          
      - name: Run Economic Calendar Bot
        run: python economic_calendar_bot.py
        
      - name: Save and Push to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add index.html
          git commit -m "อัปเดตข่าวเศรษฐกิจประจำวัน" || echo "ไม่มีข่าวใหม่"
          git push
